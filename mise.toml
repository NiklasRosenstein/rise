[tool_alias]
railpack = "github:railwayapp/railpack"
buildkit = "github:moby/buildkit"

[tools]
minikube = "1.37.0"
pack = "0.39.0"
railpack = "0.15.1"
buildkit = "0.28.0"
"cargo:sqlx-cli" = "latest"
"cargo:cargo-all-features" = "latest"
mdbook = "latest"
helm = "3"
rust = { version = "1.91.1", profile = "default" }
kubectl = "latest"
k9s = "latest"

[tasks."sqlx:prepare"]
description = "Prepare the SQLX query cache that needs to be committed for building with SQLX_OFFLINE=true."
run = "cargo sqlx prepare -- --features cli,backend --all-targets"

[tasks."sqlx:check"]
description = "Check that all SQLX queries are valid."
run = "cargo sqlx prepare --check -- --features cli,backend --all-targets"

[tasks.lint]
description = "Run all linting checks (clippy, formatting, sqlx, helm)."
run = """
cargo all-features check --all-targets
cargo all-features clippy --all-targets -- -D warnings
cargo fmt --all -- --check
mise sqlx:check
helm lint helm/rise
helm lint helm/rise-app
"""
env.SQLX_OFFLINE = true

[tasks."chart:app:package"]
description = "Package the Rise app Helm chart into dist/charts."
run = """
mkdir -p dist/charts
helm package helm/rise-app --destination dist/charts
"""

[tasks."chart:app:push-local"]
description = "Package and push the Rise app Helm chart to the local development OCI registry."
depends = ["backend:deps", "chart:app:package"]
run = """
CHART_PACKAGE=$(ls -t dist/charts/rise-app-*.tgz | head -n 1)
helm push "$CHART_PACKAGE" oci://rise-registry:5000/helm-charts --plain-http
"""

[tasks."config:schema:generate"]
description = "Generate the backend settings JSON schema."
run = "cargo run --features cli,backend -- backend config-schema > docs/schemas/backend-settings.schema.json"
env.SQLX_OFFLINE = true

[tasks."config:schema:check"]
description = "Verify the committed backend settings JSON schema is up to date."
run = "mise config:schema:generate && git --no-pager diff --exit-code -- docs/schemas/backend-settings.schema.json"
env.SQLX_OFFLINE = true

[tasks."docs:serve"]
description = "Serve documentation with live reload in port 3001."
run = "mdbook serve -p 3001 --open"

[tasks."db:nuke"]
description = "Drop and recreate the development database. USE WITH CAUTION."
run = """
set -x
docker compose down -v postgres
docker compose up postgres -d
"""

[tasks."db:migrate"]
description = "Run database migrations. Run before building the backend."
run = "docker compose up postgres -d && sleep 2 && sqlx migrate run"

[tasks."backend:deps"]
description = "Start all backend dependencies with docker compose."
run = "docker compose up -d"

[tasks."backend:run"]
description = "Run the backend server."
depends = ["backend:deps", "db:migrate"]
run = "cargo run --features cli,backend -- backend server"
alias = "br"

[tasks."backend:run-container"]
description = "Build and run the backend server in its container (host network). Useful to validate the containerized version works as intended."
depends = ["backend:deps", "db:migrate"]
run = "docker build . -t rise --target rise && docker run --rm --network host -v $PWD/config:/etc/rise:ro -v $HOME/.kube:/root/.kube:ro -v $HOME/.minikube:$HOME/.minikube:ro -e DATABASE_URL=$DATABASE_URL -e RISE_CONFIG_DIR=/etc/rise -e RISE_CONFIG_RUN_MODE=development rise backend server"

[tasks."frontend:dev"]
description = "Run the Vite frontend development server."
run = "cd frontend && npm install && npm run dev"

[tasks."frontend:build"]
description = "Build the frontend bundle for embedding in the backend binary."
run = """
cd frontend
npm install
npm run build
cp dist/index.html ../static/
cp -r dist/assets/* ../static/assets/
"""

[tasks."dist:build"]
description = "Build local release artifacts using cargo-dist."
run = """
cargo install cargo-dist --locked
cargo dist build --target x86_64-unknown-linux-gnu --target x86_64-apple-darwin --target aarch64-apple-darwin
"""

[tasks."setup:hosts"]
description = "Ensure /etc/hosts has rise-registry and rise.local entries (idempotent)."
run = """
set -x
# Remove any existing entries and re-add to ensure correctness
sudo sed -i '/\\brise-registry\\b/d; /\\brise\\.local\\b/d' /etc/hosts
echo '127.0.0.1 rise-registry' | sudo tee -a /etc/hosts
echo '127.0.0.1 rise.local' | sudo tee -a /etc/hosts
"""

[tasks."setup:docker"]
description = "Ensure Docker daemon has insecure-registries configured for the local registry (idempotent)."
run = """
set -x
DAEMON_JSON="/etc/docker/daemon.json"
DAEMON_DIR=$(dirname "$DAEMON_JSON")
REQUIRED_REGISTRIES='["rise-registry:5000","localhost:5000","127.0.0.1:5000"]'
if [ ! -d "$DAEMON_DIR" ]; then
  echo "Skipping Docker daemon config because $DAEMON_DIR does not exist."
  exit 0
fi
if [ ! -f "$DAEMON_JSON" ]; then
  echo "Creating $DAEMON_JSON with insecure-registries..."
  echo "{\"insecure-registries\": $REQUIRED_REGISTRIES}" | sudo tee "$DAEMON_JSON"
  sudo systemctl restart docker || true
elif ! grep -q 'rise-registry:5000' "$DAEMON_JSON"; then
  echo "Adding insecure-registries to existing $DAEMON_JSON..."
  UPDATED=$(jq --argjson regs "$REQUIRED_REGISTRIES" '.["insecure-registries"] = ((.["insecure-registries"] // []) + $regs | unique)' "$DAEMON_JSON")
  echo "$UPDATED" | sudo tee "$DAEMON_JSON" > /dev/null
  echo "Restarting Docker..."
  sudo systemctl restart docker || true
else
  echo "Docker daemon already configured."
fi
"""

[tasks."minikube:up"]
description = "Start Minikube with local Docker registry access and ingress port-forwarding."
depends = ["setup:hosts", "setup:docker"]
run = """
set -x

docker compose up -d registry
NETWORK_NAME=rise_default
REGISTRY_NAME=rise-registry
REGISTRY_DIR="/etc/containerd/certs.d/localhost:5000"

minikube delete
minikube start --driver=docker --insecure-registry="${REGISTRY_NAME}:5000" --memory=4096mb --cpus=2 --cni=calico
minikube addons enable ingress

for node in $(minikube node list | awk '{print $1}'); do
  docker exec "${node}" mkdir -p "${REGISTRY_DIR}"
  cat <<EOF | docker exec -i "${node}" cp /dev/stdin "${REGISTRY_DIR}/hosts.toml"
[host."http://${REGISTRY_NAME}:5000"]
EOF
done

docker network connect "${NETWORK_NAME}" minikube || true

echo
echo "Minikube started. Port-forwarding ingress-nginx-controller to localhost:8080 (HTTP) and localhost:8443 (HTTPS)..."
echo

kubectl port-forward --namespace ingress-nginx svc/ingress-nginx-controller 8080:80 8443:443 &
echo "Port-forward running in background (PID: $!)"
"""

[tasks."minikube:down"]
description = "Stop and delete Minikube."
run = "minikube delete"

[tasks."k3s:up"]
depends = ["setup:hosts", "setup:docker"]
run = """
set -x

# Configure K3s registries for insecure access to rise-registry:5000
sudo mkdir -p /etc/rancher/k3s
sudo tee /etc/rancher/k3s/registries.yaml > /dev/null <<EOF
mirrors:
  "rise-registry:5000":
    endpoint:
      - "http://rise-registry:5000"
EOF

# Ensure the local Docker registry is running
docker compose up -d registry

# Install K3s
curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--flannel-backend=none --cluster-cidr=192.168.0.0/16 --disable-network-policy --disable=traefik" sh -
sleep 10
mkdir -p ~/.kube
sudo cat /etc/rancher/k3s/k3s.yaml > ~/.kube/config
kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.31.4/manifests/operator-crds.yaml
kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.31.4/manifests/tigera-operator.yaml
kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.31.4/manifests/custom-resources.yaml
helm install --repo https://kubernetes.github.io/ingress-nginx ingress-nginx --namespace ingress-nginx ingress-nginx --create-namespace
"""

[tasks."test:e2e-build"]
description = "Run end-to-end build backend tests (all or specific backends)."
run = "bash tests/e2e-build/run.sh"

[tasks."k3s:down"]
run = """
sudo /usr/local/bin/k3s-uninstall.sh
"""

[tasks."argocd:install"]
description = "Install ArgoCD into the current cluster and set the admin password to 'password'."
run = """
set -eu

helm repo add argo https://argoproj.github.io/argo-helm >/dev/null 2>&1 || true
helm repo update argo

helm upgrade --install argocd argo/argo-cd \
  --namespace argocd \
  --create-namespace \
  --wait \
  --set configs.params."server\\.insecure"=true

PASSWORD_HASH=$(docker run --rm --entrypoint htpasswd httpd:2.4-alpine -nbBC 10 "" password | tr -d ':\n' | sed 's/^\\$2y/\\$2a/')
PASSWORD_MTIME=$(date -u +%FT%TZ)
PATCH_FILE=$(mktemp)
trap 'rm -f "$PATCH_FILE"' EXIT

cat > "$PATCH_FILE" <<EOF
stringData:
  admin.password: "$PASSWORD_HASH"
  admin.passwordMtime: "$PASSWORD_MTIME"
EOF

kubectl -n argocd patch secret argocd-secret \
  --type merge \
  --patch-file "$PATCH_FILE"

kubectl apply -f - <<EOF
apiVersion: v1
kind: Secret
metadata:
  name: rise-local-oci-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  name: rise-local-registry
  url: oci://rise-registry:5000/helm-charts/rise-app
  type: oci
  insecureOCIForceHttp: "true"
EOF

kubectl -n argocd delete secret argocd-initial-admin-secret --ignore-not-found=true
kubectl -n argocd rollout restart deployment argocd-server
kubectl -n argocd rollout restart deployment argocd-repo-server
kubectl -n argocd rollout status deployment argocd-server --timeout=180s
kubectl -n argocd rollout status deployment argocd-repo-server --timeout=180s

echo
echo "ArgoCD installed."
echo "Username: admin"
echo "Password: password"
echo "Local OCI Helm repo: rise-registry:5000 (insecure OCI enabled)"
echo
echo "Port-forward with:"
echo "  kubectl -n argocd port-forward svc/argocd-server 8081:80"
echo
echo "Then open:"
echo "  http://localhost:8081"
"""

[tasks."argocd:password"]
description = "Print the current ArgoCD initial admin password if the secret exists."
run = """
set -eu
kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
echo
"""
