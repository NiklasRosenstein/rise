#:schema http://rise.local:3000/api/v1/schema/rise-toml/v1
version = 1

[project]
name = "hello-world"
access_class = "private"
custom_domains = []

[project.env]
APP_ENV = "production"

[environments.production]
env = { LOG_LEVEL = "warn" }

[environments.staging]
env = { LOG_LEVEL = "debug" }
